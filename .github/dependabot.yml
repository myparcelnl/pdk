version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
    commit-message:
      prefix: 'build'
      include: 'scope'

  - package-ecosystem: 'composer'
    directory: '/'
    schedule:
      interval: 'daily'
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: 'build'
      include: 'scope'
    groups:
      minor-php-updates:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'
