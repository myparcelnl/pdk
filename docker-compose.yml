x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      PHP_VERSION: ${PHP_VERSION:-7.4}
  image: pdk-${PHP_VERSION:-7.4}

services:
  php:
    <<: *common
    init: true
    command: ['composer', 'install', '--no-interaction', '--no-progress']
    env_file:
      - .env
    volumes:
      - ./:/app

  console:
    <<: *common
    init: true
    command: []
    entrypoint: ['php', 'bin/console']
    volumes:
      - ./:/app
